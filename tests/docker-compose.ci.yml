services:
  dind:
    image: docker:20-dind
    command: ["--tls=false"]
    container_name: dind-ci
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - opt-volume:/opt
      - tmp-volume:/tmp
  otter-test:
    image: otter-service:test
    container_name: otter-test
    depends_on:
      - dind
    environment:
      DOCKER_HOST: tcp://dind-ci:2375
      DOCKER_CLI_EXPERIMENTAL: enabled
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      ENVIRONMENT: ${ENVIRONMENT}
      LOG_LEVEL: DEBUG
      GOOGLE_APPLICATION_CREDENTIALS: /etc/gcp/creds.json
      github_app_id: ${github_app_id}
      github_app_installation_id: ${github_app_installation_id}
      github_app_private_key: ${github_app_private_key}
      # Mirror prod otter-env ConfigMap so background grading tasks have the
      # config they need to actually run + write grades.
      gcp_project_id: ${GCP_PROJECT_ID}
      environment: ${ENVIRONMENT}
      verbose_logging: "True"
      post_grade: "False"
      edx_url: courses.edx.org
      jh_client_id: service-otter_grade
      jh_service_prefix: /services/otter_grade/
      jh_service_name: otter_grade
      test_user: TEST_USER
    ports:
      - 10101:10101
    volumes:
      - opt-volume:/opt
      - tmp-volume:/tmp
      - ${GHA_GCP_CREDS_FILE}:/etc/gcp/creds.json:ro
volumes:
  opt-volume:
  tmp-volume:
