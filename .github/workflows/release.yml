name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      quick_test:
        description: 'Skip full grading test, use lab01 only (faster for hotfixes)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@main
        with:
          configuration: 'release-changelog-builder-config.json'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: actions/create-release@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: ${{ steps.build_changelog.outputs.changelog }}
          draft: false
          prerelease: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build package
        run: |
          pip install build
          python3 -m build

      - name: Authenticate to GCP (for grading test)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/75088546496/locations/global/workloadIdentityPools/otter-pool/providers/github-actions'
          service_account: 'otter-sa@data8x-scratch.iam.gserviceaccount.com'

      - name: Build Docker image for grading test
        run: docker build -t otter-service:test .

      - name: Start otter-service for grading test
        run: |
          docker run -d --name otter-test -p 10101:10101 \
            -e GCP_PROJECT_ID=${{ vars.GCP_PROJECT }} \
            -e ENVIRONMENT=otter-ci-test-${{ github.run_id }} \
            -e LOG_LEVEL=INFO \
            otter-service:test

      - name: Wait for service to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:10101/services/otter_grade/ 2>/dev/null; then
              echo "Service ready"
              exit 0
            fi
            echo "Attempt $i: waiting for service..."
            sleep 2
          done
          echo "Service failed to start"
          docker logs otter-test
          exit 1

      - name: Fetch notebooks for grading test
        env:
          GITHUB_APP_ID: ${{ vars.COURSE_CONTENT_READER_APP_ID }}
          GITHUB_APP_INSTALLATION_ID: ${{ vars.COURSE_CONTENT_READER_INSTALLATION_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.COURSE_CONTENT_READER_PRIVATE_KEY }}
        run: |
          pip install nbformat pyyaml PyJWT requests -q
          python3 tests/fetch_test_notebooks.py \
            --courses "88ex,88bx,88cx,8x" \
            ${{ inputs.quick_test == true && '--smoke' || '' }}

      - name: Run grading test
        run: |
          pip install google-cloud-firestore requests -q
          python3 tests/run_docker_grade_check.py \
            --run-id "${{ github.run_id }}"
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT }}

      - name: Stop otter container
        if: always()
        run: |
          docker stop otter-test 2>/dev/null || true
          docker rm otter-test 2>/dev/null || true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/75088546496/locations/global/workloadIdentityPools/otter-pool/providers/github-actions'
          service_account: 'otter-sa@data8x-scratch.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --substitutions=_TAG_NAME=${{ github.ref_name }} \
            --config ./cloudbuild.yaml

  update-edx-hub:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.EDX_IMAGE_BUILDER_APP_ID }}
          private-key: ${{ secrets.EDX_IMAGE_BUILDER_PRIVATE_KEY }}
          owner: edx-berkeley

      # Base the auto-bumper branch on `staging`, not the default branch.
      # The default branch (prod) is normally behind staging — basing the
      # bump branch on prod and PR-ing into staging produces a huge diff
      # where staging-only commits look like additions. Pinning to
      # `staging` keeps the diff tight (single line in values.yaml).
      - name: Checkout edx-hub
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: edx-berkeley/edx-hub
          ref: staging
          sparse-checkout: otter-service/

      - name: Set git identity
        run: |
          git config --global user.email "otter-service-bot[bot]@users.noreply.github.com"
          git config --global user.name "otter-service-bot[bot]"

      - name: Update otter-srv image tag
        run: |
          sed -i "/^otter_srv:/,/^[^ ]/ s/    tag:.*/    tag: ${{ github.ref_name }}/" otter-service/values.yaml
          echo "Updated otter_srv.tag to ${{ github.ref_name }}"
          grep "tag:" otter-service/values.yaml

      - name: Open PR to edx-hub
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="update-otter-srv-tag-${{ github.ref_name }}"
          MESSAGE="update otter-srv image tag to ${{ github.ref_name }}"
          git checkout -b ${BRANCH}
          git add otter-service/values.yaml
          git commit -m "${MESSAGE}"
          git push origin ${BRANCH}
          gh pr create -t "${MESSAGE}" -b "${MESSAGE}" -H ${BRANCH} -B staging \
            -R edx-berkeley/edx-hub