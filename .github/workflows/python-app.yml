name: Python application

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "docs/**"
      - ".github/**"
  pull_request_target:
    branches: [ main ]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "docs/**"
      - ".github/**"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8
          pip install -r requirements/requirements.txt
          pip install .

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=50 --max-line-length=150 --statistics

      - name: Validate Docker build
        run: docker build -t otter-srv:pr .

      - name: Notify Slack
        # Skip on fork PRs — org-level SLACK_WEBHOOK_URL is not exposed to
        # `pull_request` (only `pull_request_target`) workflows from forks.
        # Without this guard the step fails "Missing input" on every fork PR.
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "${{ job.status == 'success' && '✅' || '❌' }} otter-service lint-and-build ${{ job.status }} — ${{ github.head_ref }} · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run #${{ github.run_id }}>"}

  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    environment: otter-service
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/75088546496/locations/global/workloadIdentityPools/otter-pool/providers/github-actions'
          service_account: 'otter-sa@data8x-scratch.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-env
          pip install -r requirements/requirements.txt
          pip install .

      - name: Test with pytest
        env:
          github_app_id: ${{ vars.COURSE_CONTENT_READER_APP_ID }}
          github_app_installation_id: ${{ vars.COURSE_CONTENT_READER_INSTALLATION_ID }}
          github_app_private_key: ${{ secrets.COURSE_CONTENT_READER_PRIVATE_KEY }}
        run: pytest

      - name: Remind to tag after merge
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ All checks passed! After merging, remember to bump the version, update CHANGELOG, then tag and push to trigger a release:\n```\ngit tag X.Y.Z\ngit push upstream X.Y.Z\n```'
            })

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "${{ job.status == 'success' && '✅' || '❌' }} otter-service test ${{ job.status }} — ${{ github.head_ref }} · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run #${{ github.run_id }}>"}
